<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pokemon Red Emulator</title>

<link rel="stylesheet" href="/static/style.css">

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

</head>

<body>

<div id="emulator-container">

<h1>Pokemon Red Emulator</h1>

<canvas id="screen" width="160" height="144"></canvas>

<div id="controls">
<button type="button" id="save">Save</button>
<button type="button" id="load">Load</button>
<button type="button" id="remap">Remap Keys</button>
</div>

<div id="keymap-panel" style="display:none;">
<h3>Remap Keys</h3>

<div id="keymap-rows"></div>

<button type="button" id="save-keymap">Save Keymap</button>
<button type="button" id="reset-keymap">Reset to Default</button>
<button type="button" id="close-keymap">Close</button>

<div id="keymap-status"></div>

</div>

<div id="status">Connected</div>

</div>

<script src="/static/main.js"></script>

</body>
</html>
